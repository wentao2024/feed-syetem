spring:
  datasource:
    url: jdbc:h2:mem:user_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: false

  rabbitmq:
    host: localhost
    port: 5672

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
    banner: false

eureka:
  client:
    enabled: false

jwt:
  secret: test-secret-key-that-is-at-least-256-bits-long-for-unit-tests-only
  expiration-ms: 86400000
