spring:
  datasource:
    url: jdbc:h2:mem:post_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: false

  rabbitmq:
    host: localhost
    port: 5672

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
    banner: false

eureka:
  client:
    enabled: false

storage:
  upload-dir: /tmp/feed-test-uploads
  base-url: http://localhost:8082/files
