name: Build & Deploy to AWS ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: '**/target/*.jar'
          retention-days: 1

  # ─── Build & Push Docker Images ────────────────────────────────────
  docker:
    name: Push Docker Images to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [eureka-server, api-gateway, user-service, post-service, feed-service]

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/feed-${{ matrix.service }}:${{ github.sha }}
          docker build -f ${{ matrix.service }}/Dockerfile -t $IMAGE_URI .
          docker push $IMAGE_URI
          # Also tag as latest
          docker tag $IMAGE_URI ${{ env.ECR_REGISTRY }}/feed-${{ matrix.service }}:latest
          docker push ${{ env.ECR_REGISTRY }}/feed-${{ matrix.service }}:latest

  # ─── Deploy to ECS Fargate ─────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [eureka-server, api-gateway, user-service, post-service, feed-service]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ${{ matrix.service }} to ECS
        run: |
          aws ecs update-service \
            --cluster feed-cluster \
            --service feed-${{ matrix.service }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster feed-cluster \
            --services feed-${{ matrix.service }} \
            --region ${{ env.AWS_REGION }}
