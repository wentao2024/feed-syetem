server:
  port: 8080
  tomcat:
    threads:
      max: 400        # 默认 200，提高到 400
    accept-count: 200 # 默认 100，等待队列加大
    connection-timeout: 20000

spring:
  application:
    name: api-gateway


  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Public routes (no auth required)
        - id: user-auth
          uri: lb://user-service
          predicates:
            - Path=/api/users/register, /api/users/login
          filters:
            - StripPrefix=0

        # Protected routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter

        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**
          filters:
            - JwtAuthFilter

        - id: feed-service
          uri: lb://feed-service
          predicates:
            - Path=/api/feed/**
          filters:
            - JwtAuthFilter

        # Swagger UI aggregation
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}

        - id: post-service-docs
          uri: lb://post-service
          predicates:
            - Path=/post-service/v3/api-docs
          filters:
            - RewritePath=/post-service/(?<segment>.*), /$\{segment}

        - id: feed-service-docs
          uri: lb://feed-service
          predicates:
            - Path=/feed-service/v3/api-docs
          filters:
            - RewritePath=/feed-service/(?<segment>.*), /$\{segment}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:feed-system-secret-key-must-be-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
